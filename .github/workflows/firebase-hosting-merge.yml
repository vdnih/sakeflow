# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
      - run: flutter pub get
        working-directory: app
      - run: flutter build web --release
        working-directory: app
      - run: cd functions && npm ci
      - run: cd functions && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SAKEFLOW }}
          channelId: live
          projectId: sakeflow
      - name: Deploy Cloud Functions
        working-directory: functions
        run: |
          echo "$FIREBASE_SA_KEY" > "$RUNNER_TEMP/sa.json"
          npx firebase-tools deploy --only functions --project sakeflow --non-interactive --force
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SAKEFLOW }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
